<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kamar-Taj</title>
    <style>
        body { max-width: 650px; margin: 0 auto; padding: 40px 20px; font-family: -apple-system, sans-serif; line-height: 1.8; color: #333; background: #fff; }
        #content { min-height: 300px; }
        /* 目录样式：大间距，方便手机点击 */
        。menu-item { display: block; padding: 15px; margin: 10px 0; background: #f9f9f9; border-radius: 8px; text-decoration: none; color: #007bff; font-weight: 500; border: 1px solid #eee; }
        nav { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        。back-btn { text-decoration: none; color: #888; font-size: 14px; }
        h1 { font-size: 24px; border-bottom: 2px solid #007bff; display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <nav id="nav" style="display:none;"><a href="?" class="back-btn">⬅ 返回目录</a></nav>
        <div id="content">正在翻开书本...</div>
    </div>
<script>
    const contentDiv = document.getElementById('content');
    const nav = document.getElementById('nav');
    const params = new URLSearchParams(window.location.search);
    const fileName = params.get('p');

    if (fileName) {
        nav.style.display = 'block';
        // 直接从当前路径抓取文件，不需要 API
        fetch(fileName)
            .then(res => {
                if(!res.ok) throw new Error();
                return res.text();
            })
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(() => {
                contentDiv.innerHTML = "读取失败，请检查文件名 " + fileName + " 是否存在";
            });
    } else {
        // 如果没有参数，提示手动去 menu.md（因为不调 API 无法自动列出文件）
        contentDiv.innerHTML = "<h1>我的目录</h1><p>自动目录加载失败，请手动访问：</p><a href='?p=menu.md' class='menu-item'>点此进入手动目录</a>";
    }
</script>
     
</body>
</html>
