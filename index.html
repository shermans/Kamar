<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的书库</title>
    <style>
        body { max-width: 650px; margin: 0 auto; padding: 30px 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.8; color: #333; background: #fff; }
        #content { min-height: 200px; }
        .menu-item { display: block; padding: 18px; margin: 12px 0; background: #f8f9fa; border-radius: 10px; text-decoration: none; color: #007bff; border: 1px solid #eaecef; font-size: 18px; }
        .menu-item:active { background: #e9ecef; }
        nav { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .back-link { text-decoration: none; color: #666; font-size: 15px; border: 1px solid #ccc; padding: 5px 10px; border-radius: 5px; }
        h1 { font-size: 22px; color: #1a1a1a; }
        .loading { color: #999; text-align: center; margin-top: 50px; }
        .error { color: red; background: #fff0f0; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="app">
        <nav id="nav" style="display:none;"><a href="index.html" class="back-link">⬅ 返回目录</a></nav>
        <div id="content"><div class="loading">正在努力加载书架...</div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.2/marked.min.js"></script>

    <script>
        // --- 核心配置 ---
        const USER = 'shermans'; 
        const REPO = 'Kamar';
        // ---------------

        const contentDiv = document.getElementById('content');
        const nav = document.getElementById('nav');
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('p');

        if (fileName) {
            // 场景：显示文章正文
            nav.style.display = 'block';
            fetch(fileName)
                .then(res => {
                    if(!res.ok) throw new Error('找不到文件');
                    return res.text();
                })
                .then(text => {
                    contentDiv.innerHTML = marked.parse(text);
                    // 自动提取第一行作为标题
                    const title = text.split('\n')[0].replace('# ', '');
                    document.title = title || "文章正文";
                })
                .catch(err => {
                    contentDiv.innerHTML = `<div class="error">读取文章失败，请确保仓库里有 ${fileName} 这个文件。</div>`;
                });
        } else {
            // 场景：自动生成目录
            const apiUrl = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
            fetch(apiUrl)
                .then(res => res.json())
                .then(data => {
                    let html = "<h1>📖 目录</h1>";
                    let count = 0;
                    data.forEach(file => {
                        // 排除 index.html, README 和非 md 文件
                        if (file.name.endsWith('.md') && file.name.toLowerCase() !== 'readme.md') {
                            const displayName = file.name.replace('.md', '');
                            html += `<a href="?p=${file.name}" class="menu-item">${displayName}</a>`;
                            count++;
                        }
                    });
                    if(count === 0) html += "<p>书架上还没有文章，去新建一个 .md 文件吧！</p>";
                    contentDiv.innerHTML = html;
                })
                .catch(err => {
                    contentDiv.innerHTML = `<div class="error">无法连接书架。请检查网络，或确认仓库已设置为 Public。</div>`;
                });
        }
    </script>
</body>
</html>
